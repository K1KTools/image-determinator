<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K1K Image Determinator</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #top-bar {
            width: 100%;
            max-width: 840px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .top-link {
            color: #00adb5;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #00adb5;
            transition: 0.2s;
            cursor: pointer;
            background: transparent;
            font-size: 1rem;
        }

        .top-link:hover {
            background-color: #00adb5;
            color: #121212;
        }

        .donar-link {
            border-color: #ff0055;
            color: #ff0055;
            margin-right: 15px;
        }

        .donar-link:hover {
            background-color: #ff0055;
            color: #121212;
        }

        #main-title {
            margin: 0;
            font-size: 1.5rem;
            color: #fff;
            text-align: center;
            flex-grow: 1;
        }

        #right-controls {
            display: flex;
            align-items: center;
        }

        #lang-select {
            background: #1e1e1e;
            color: white;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 4px;
            outline: none;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }

        #controles-container {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-top: 30px;
        }

        #drop-zone {
            border: 2px dashed #00adb5;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #222;
            margin-bottom: 15px;
            font-weight: bold;
            transition: 0.2s;
        }

        #drop-zone:hover { background: #2a2a2a; }

        .control-row {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-grow: 1;
            min-width: 100px;
        }

        label { font-size: 0.85rem; font-weight: bold; color: #ccc; cursor: help; }

        input[type="number"], input[type="range"], select, input[type="color"] {
            background: #2a2a2a;
            color: white;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        
        input:disabled, select:disabled { background: #1a1a1a; color: #666; cursor: not-allowed; }

        button {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            flex-grow: 1;
            transition: 0.2s;
        }
        button:hover:not(:disabled) { background-color: #007a80; }
        
        button:disabled { 
            background-color: #555555 !important; 
            color: #ffffff !important; 
            cursor: not-allowed; 
            opacity: 1; 
        }
        
        button.btn-accion { background-color: #ffaa00; color: #000; }
        button.btn-accion:hover:not(:disabled) { background-color: #cc8800; }
        
        button.btn-cancelar { background-color: #cc0000; color: #fff; }
        button.btn-cancelar:hover:not(:disabled) { background-color: #aa0000; }

        button.btn-reset { background-color: #444; color: #fff; border: 1px solid #666; }
        button.btn-reset:hover:not(:disabled) { background-color: #666; }

        button.btn-play { background-color: #ff0055; }
        button.btn-play:hover:not(:disabled) { background-color: #cc0044; }

        button.btn-dl { background-color: #00cc66; color: #000; }
        button.btn-dl:hover:not(:disabled) { background-color: #00aa55; }

        button.btn-purple { background-color: #8c00ff; color: #fff; }
        button.btn-purple:hover:not(:disabled) { background-color: #7000cc; }

        .btn-demo { background-color: #8c00ff; color: #fff; display: none; }
        .btn-demo:hover:not(:disabled) { background-color: #7000cc; }

        details {
            background: #252525;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        details summary { cursor: pointer; font-weight: bold; outline: none; margin-bottom: 10px; color: #00adb5; }
        
        canvas { 
            background-color: #050505; 
            border: 1px solid #333; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5); 
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
        }

        #estado-container {
            margin-top: 10px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 5px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            box-sizing: border-box;
        }
        
        #estado {
            font-family: monospace;
            color: #aaa;
            font-size: 0.95rem;
        }

        progress {
            width: 100%;
            height: 12px;
            border-radius: 5px;
            margin-top: 10px;
            background: #222;
            border: 1px solid #333;
            display: none;
        }
        progress::-webkit-progress-bar { background: #222; border-radius: 5px; }
        progress::-webkit-progress-value { background: #8c00ff; border-radius: 5px; transition: width 0.1s linear; }
        progress::-moz-progress-bar { background: #8c00ff; border-radius: 5px; }

        .panel-destacado {
            background: #111;
            padding: 15px;
            border-radius: 6px;
            border: 1px dashed #8c00ff;
            margin-top: 15px;
            transition: 0.3s;
        }
        .chk-label {
            display: flex; align-items: center; gap: 8px; cursor: pointer; color: white; font-size: 0.9rem;
        }

        #help-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #1e1e1e;
            padding: 30px;
            border: 1px solid #00adb5;
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 8px;
            color: #e0e0e0;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            line-height: 1.6;
        }

        .close-btn {
            color: #aaa;
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-btn:hover { color: #ff0055; }
        .modal-content h2 { color: #00adb5; margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .modal-content h3 { color: #ffaa00; margin-top: 25px; }
        .modal-content h4 { color: #fff; margin-bottom: 5px; }
        .modal-content p { margin-top: 5px; }
        .modal-content ul { padding-left: 20px; }
        .modal-content li { margin-bottom: 8px; }
        .modal-content strong { color: #00adb5; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div>
            <a href="https://k1ktools.github.io/" target="_blank" class="top-link">K1K Tools</a>
            <button id="btn-help" class="top-link" style="margin-left: 10px;">Cómo usar</button>
        </div>
        <h1 id="main-title">K1K Image Determinator</h1>
        <div id="right-controls">
            <a href="https://ko-fi.com/k1000k" target="_blank" class="top-link donar-link"><span id="lbl-donar">Donar</span></a>
            <select id="lang-select">
                <option value="es">Español</option>
                <option value="en">English</option>
            </select>
        </div>
    </div>

    <div id="help-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <div id="help-text"></div>
        </div>
    </div>

    <div id="controles-container">
        <div id="drop-zone" data-i18n-title="t_dropzone">
            <span id="lbl-dropzone">Arrastra una imagen o un archivo .json aquí o haz clic</span>
            <input type="file" id="file-input" accept="image/*,.json,application/json" style="display: none;">
        </div>

        <div class="control-row">
            <div class="control-group" style="max-width: 120px;">
                <label id="lbl-cantidad" data-i18n-title="t_cantidad">Cantidad de Partículas:</label>
                <input type="number" id="input-cantidad" value="2000">
            </div>
            <div class="control-group">
                <label id="lbl-ancho" data-i18n-title="t_ancho">Ancho del Contenedor: <span id="val-ancho">400</span>px</label>
                <input type="range" id="slider-ancho" min="100" max="780" value="400">
            </div>
            <div class="control-group" style="max-width: 180px;">
                <label id="lbl-mapeo" data-i18n-title="t_mapeo">Modo de Mapeo:</label>
                <select id="map-mode">
                    <option value="crop" id="opt-crop">Recortar (Mantener proporción)</option>
                    <option value="stretch" id="opt-stretch">Estirar (Ajustar a los bordes)</option>
                </select>
            </div>
        </div>

        <details>
            <summary id="lbl-summary" data-i18n-title="t_summary">Físicas, Rendimiento y Emisión</summary>
            
            <div class="control-row" style="margin-bottom: 15px;">
                <div class="control-group">
                    <label id="lbl-bgcolor" data-i18n-title="t_bgcolor">Color de Fondo:</label>
                    <input type="color" id="input-bg-color" value="#050505" style="padding: 2px; height: 35px;">
                </div>
                <div class="control-group" style="flex-grow: 2;">
                    <label id="lbl-pcolor" data-i18n-title="t_pcolor">Color de Partículas (Previo a textura):</label>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="color" id="input-particle-color" value="#ffffff" style="padding: 2px; height: 35px;">
                        <label class="chk-label" data-i18n-title="t_random" style="white-space: nowrap;">
                            <input type="checkbox" id="check-random-color" style="width:18px; height:18px;">
                            <span id="lbl-random">Arcoíris</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <label id="lbl-aparicion" data-i18n-title="t_aparicion">Modo de Emisión:</label>
                    <select id="spawn-mode">
                        <option value="fuente" id="opt-fuente">Fuente (Ascendente)</option>
                        <option value="normal" id="opt-normal">Lluvia (Toda el área)</option>
                        <option value="chorroCentral" id="opt-centro">Emisión Central</option>
                        <option value="olaIzq" id="opt-izq">Proyección Izquierda</option>
                        <option value="olaDer" id="opt-der">Proyección Derecha</option>
                    </select>
                </div>
                <div class="control-group">
                    <label id="lbl-duracion" data-i18n-title="t_duracion">Duración de Emisión (s):</label>
                    <input type="number" id="input-spawntime" value="10" min="0" step="1">
                </div>
                <div class="control-group">
                    <label id="lbl-fuente" data-i18n-title="t_fuente">Fuerza de Fuente:</label>
                    <input type="number" id="input-fountain" value="15" step="1">
                </div>
            </div>
            <div class="control-row">
                <div class="control-group">
                    <label id="lbl-substeps" data-i18n-title="t_substeps">Sub-pasos Físicos:</label>
                    <input type="number" id="input-substeps" value="20" min="1">
                </div>
                <div class="control-group">
                    <label id="lbl-iters" data-i18n-title="t_iters">Iteraciones (Dureza):</label>
                    <input type="number" id="input-iters" value="3" min="1" max="10">
                </div>
            </div>
        </details>

        <details>
            <summary id="lbl-advanced" data-i18n-title="t_advanced">Avanzado ⚠️</summary>
            <div class="control-row">
                <div class="control-group">
                    <label id="lbl-fuerzacaida" data-i18n-title="t_fuerzacaida">Fuerza de Caída:</label>
                    <input type="number" id="input-dropforce" value="0" step="1">
                </div>
                <div class="control-group">
                    <label id="lbl-fps" data-i18n-title="t_fps">FPS Globales:</label>
                    <input type="number" id="input-fps" value="60" min="1" max="240">
                </div>
                <div class="control-group">
                    <label id="lbl-grav" data-i18n-title="t_grav">Gravedad:</label>
                    <input type="number" id="input-grav" value="1.0" step="0.1">
                </div>
                <div class="control-group">
                    <label id="lbl-rebote" data-i18n-title="t_rebote">Rebote:</label>
                    <input type="number" id="input-bounce" value="0.5" step="0.1" min="0" max="1.5">
                </div>
            </div>
        </details>
        
        <div class="control-row" style="margin-top: 15px; margin-bottom: -5px;">
            <button id="btn-reset" class="btn-reset" data-i18n-title="t_btnreset">Restablecer Valores</button>
        </div>

        <div class="panel-destacado">
            <div class="control-row">
                <label class="chk-label" data-i18n-title="t_chkvisual">
                    <input type="checkbox" id="check-mostrar-calc" style="width:18px; height:18px;">
                    <span id="lbl-chkvisual">Mostrar progreso visual durante el procesamiento (más lento)</span>
                </label>
            </div>
            <div class="control-row" style="margin-top: 10px;">
                <label class="chk-label" data-i18n-title="t_chkautocut">
                    <input type="checkbox" id="check-auto-cut" checked style="width:18px; height:18px;">
                    <span id="lbl-chkautocut">Detener simulación automáticamente</span>
                </label>
                <label class="chk-label" data-i18n-title="t_chkautoframes">
                    <input type="checkbox" id="check-auto-frames" checked style="width:18px; height:18px;">
                    <span id="lbl-chkautoframes">Calcular fotogramas automáticamente</span>
                </label>
                <div class="control-group" style="max-width: 150px;">
                    <label id="lbl-frames" data-i18n-title="t_frames">Fotogramas meta:</label>
                    <input type="number" id="input-target-frames" value="800" min="100" disabled>
                </div>
            </div>
            
            <div class="control-row" style="margin-top: 15px;">
                <button id="btn-iniciar" disabled data-i18n-title="t_btniniciar">Iniciar Procesamiento</button>
                <button id="btn-pause-calc" class="btn-accion" style="flex-grow:0; width:110px;" disabled data-i18n-title="t_btnpausar">Pausar</button>
                <button id="btn-cancel-calc" class="btn-cancelar" style="flex-grow:0; width:110px;" disabled data-i18n-title="t_btncancelar">Cancelar</button>
                <button id="btn-pintar" class="btn-accion" disabled data-i18n-title="t_btnpintar">Cortar y Pintar</button>
            </div>

            <div class="control-row" style="margin-top: 15px; border-top: 1px solid #333; padding-top: 15px;">
                <div class="control-group" style="max-width: 120px;">
                    <label id="lbl-vel" style="color:#ccc;" data-i18n-title="t_vel">Velocidad final:</label>
                    <input type="number" id="input-speed" value="1.0" step="0.1" min="0.1" max="5.0">
                </div>
                <button id="btn-play" class="btn-play" disabled data-i18n-title="t_btnplay">Reproducir Simulación</button>
                <button id="btn-demo" class="btn-demo" data-i18n-title="t_btndemo">Demo 👀</button>
                <button id="btn-pause-play" class="btn-accion" style="flex-grow:0; width:110px;" disabled data-i18n-title="t_btnpausarplay">Pausar</button>
            </div>
            <div class="control-row" style="margin-top: 10px;">
                <button id="btn-dl" class="btn-dl" disabled data-i18n-title="t_btndl">Descargar Video (.webm)</button>
                <button id="btn-export" class="btn-purple" disabled data-i18n-title="t_btnexport">Exportar (.json)</button>
                <button id="btn-import" class="btn-purple" data-i18n-title="t_btnimport">Importar (.json)</button>
                <input type="file" id="import-input" accept=".json,application/json" style="display: none;">
            </div>
        </div>
    </div>

    <canvas id="simCanvas" width="800" height="600"></canvas>
    <canvas id="hiddenCanvas" style="display: none;"></canvas>

    <div id="estado-container">
        <div id="estado">Estado: ESPERANDO IMAGEN O JSON</div>
        <progress id="progreso-calc" value="0" max="100"></progress>
    </div>

                    <h2>How to use K1K Image Determinator</h2>
                    <p>Welcome. This tool allows you to simulate particle physics and map an image onto them to create smooth, pre-rendered animations.</p>
                    
                    <div class="help-section">
                        <h3>Basic Steps</h3>
                        <ol>
                            <li><strong>Upload a file:</strong> Drag your image into the dashed box or click to select it. You can also drop exported JSON files here.</li>
                            <li><strong>Start Processing:</strong> Click <em>"Start Processing"</em>. The physics engine will mathematically calculate where each particle falls and save it in RAM.</li>
                            <li><strong>Cut and Paint:</strong> If auto-cut is enabled, the system stops automatically at the target frame. In manual mode, press <em>"Cut and Paint"</em> when you are happy with the particle pile.</li>

                    </div>

                    <div class="help-section">
                        <h3>Export / Import (.json)</h3>
                        <ul>
                            <li><strong>Export:</strong> If your simulation processing took a long time and you want to keep the final result, you can save it. The system will encode the raw memory arrays into a lightweight JSON file using Base64.</li>
                            <li><strong>Import:</strong> Load a previously exported <code>.json</code> file. The program will inject the frames directly into RAM, bypassing all mathematical processing. It will be ready to play or download as a video instantly.</li>
                        </ul>
                    </div>

                    <div class="help-section">
                        <h3>Physics and Performance Settings</h3>
                        <ul>
                            <li><strong>Particle Count:</strong> More particles mean better image quality, but longer calculation times. (Recommended: 1000 - 5000).</li>
                            <li><strong>Emission Mode:</strong> Choose the spawn position (e.g. from above, central stream, fountain).</li>
                            <li><strong>Emission Duration (s):</strong> Exact time it will take for all chosen particles to be spawned.</li>
                            <li><strong>Physics Sub-steps:</strong> Divides the time of each frame for better accuracy. High values prevent particles from clipping through colliders at high speeds.</li>
                            <li><strong>Iterations (Hardness):</strong> Collision resolution repeats. High values prevent particles from getting squished at the bottom of the pile.</li>

        // Base64 Helpers
        function encodeF32(f32array) {
            let u8 = new Uint8Array(f32array.buffer);
            let str = '';
            for (let i = 0; i < u8.length; i++) {
                str += String.fromCharCode(u8[i]);
            }
            return btoa(str);
        }

        function decodeF32(b64) {
            let str = atob(b64);
            let u8 = new Uint8Array(str.length);
            for (let i = 0; i < str.length; i++) {
                u8[i] = str.charCodeAt(i);
            }
            return new Float32Array(u8.buffer);
        }

        let seed = 42;

        class Ball {
            constructor(x, y, vx, vy, radius, bounce, canCollide, spawnFrame, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
                this.mass = 10;
                this.bounce = bounce;
                this.canCollide = canCollide;
                this.color = color; 
                this.spawnFrame = spawnFrame;
                this.isActive = false;
            }

            update(dt, gravity) {
                this.vy += gravity * dt;
                this.vx *= Math.pow(env.friction, dt);
                this.vy *= Math.pow(env.friction, dt);
                this.x += this.vx * dt;
                this.y += this.vy * dt;

                if (!this.canCollide && this.vy > 0) this.canCollide = true;
            }

            constrain() {
                if (this.y > floorY - this.radius) {
                    this.y = floorY - this.radius;
                    this.vy *= -this.bounce;
                    this.vx *= 0.8; 
                }
                if (this.x < wallLeft + this.radius) {
                    this.x = wallLeft + this.radius;
                    this.vx *= -this.bounce;
                }
                if (this.x > wallRight - this.radius) {
                    this.x = wallRight - this.radius;
                    this.vx *= -this.bounce;
                }
            }

            draw(context = ctx) {
                context.beginPath();
                context.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                context.fillStyle = this.color;
                context.fill();
            }
        }

        function solveCollisions() {
            let count = 0;
            for (let i = 0; i < allBalls.length; i++) {
                if (allBalls[i].isActive && allBalls[i].canCollide) {
                    collidableBalls[count++] = allBalls[i];
                }
            }
            collidableBalls.length = count;
            collidableBalls.sort((a, b) => a.x - b.x);

            for (let i = 0; i < count; i++) {
                let b1 = collidableBalls[i];
                for (let j = i + 1; j < count; j++) {
                    let b2 = collidableBalls[j];
                    
                    let dx = b2.x - b1.x;
                    if (dx > b1.radius + b2.radius) break; 

                    let dy = b2.y - b1.y;
                    let minDist = b1.radius + b2.radius;
                    let distSq = dx * dx + dy * dy;

                    if (distSq < minDist * minDist && distSq > 0) {
                        let dist = Math.sqrt(distSq);
                        let overlap = minDist - dist;
                        let nx = dx / dist;
                        let ny = dy / dist;
                        
                        let im1 = 1 / b1.mass;
                        let im2 = 1 / b2.mass;
                        let sum_im = im1 + im2;
                        let r1 = im1 / sum_im;
                        let r2 = im2 / sum_im;

                        b1.x -= nx * overlap * r1;
                        b1.y -= ny * overlap * r1;
                        b2.x += nx * overlap * r2;
                        b2.y += ny * overlap * r2;

                        let kx = b1.vx - b2.vx;
                        let ky = b1.vy - b2.vy;
                        let p = 2.0 * (nx * kx + ny * ky) / sum_im;
                        
                        let bounce = Math.min(b1.bounce, b2.bounce);
                        b1.vx -= p * im1 * nx * bounce;
                        b1.vy -= p * im1 * ny * bounce;
                        b2.vx += p * im2 * nx * bounce;
                        b2.vy += p * im2 * ny * bounce;
                    }
                }
            }
        }

        function dibujarFondoYParedes(context) {
            context.fillStyle = inputBgColor.value;
            context.fillRect(0, 0, 800, 600);
            context.strokeStyle = '#2e2e2e';
            context.lineWidth = 2;
            context.beginPath();
            context.moveTo(wallLeft, 0);
            context.lineTo(wallLeft, floorY);
            context.lineTo(wallRight, floorY);
            context.lineTo(wallRight, 0);
            context.stroke();
        }

            const count = parseInt(inputCantidad.value) || 1000;

            let targetArea = boxW * 400 * 0.7;

            let cols = Math.max(1, Math.floor(boxW / (particleRadius * 2.2)));
            let roofY = floorY - 600; 
            
            const isRandomColor = checkRandomColor.checked;

            for (let i = 0; i < count; i++) {
                let px, py, vx, vy, canCollide;
                let sFrame = totalSpawnFrames > 0 ? Math.floor((i / count) * totalSpawnFrames) : 0;
                
                if (mode === 'normal') {
                    let col = i % cols;
                    px = wallLeft + particleRadius + (col * particleRadius * 2.2);
                    py = roofY - (random() * 50); 
                    vx = (random() - 0.5) * 4;
                    vy = (random() * 2) + dropForce; 
                    canCollide = true;
                } 
                else if (mode === 'chorroCentral') {
                    let centerX = wallLeft + (boxW / 2);

                    py = roofY - (random() * 50);

                    vy = (random() * 2) + dropForce;
                    canCollide = true;
                }
                else if (mode === 'olaIzq') {
                    px = wallLeft + particleRadius + (random() * 10);
                    py = roofY - (random() * 50);
                    vx = (random() * 8) + 2; 
                    vy = ((random() - 0.5) * 2) + dropForce;
                    canCollide = true;
                }
                else if (mode === 'olaDer') {
                    px = wallRight - particleRadius - (random() * 10);
                    py = roofY - (random() * 50);
                    vx = (random() * -8) - 2; 
                    vy = ((random() - 0.5) * 2) + dropForce;
                    canCollide = true;
                }
                else if (mode === 'fuente') {
                    let centerX = wallLeft + (boxW / 2);
                    px = centerX + (random() - 0.5) * (boxW * 0.05); 
                    py = floorY - particleRadius; 
                    vx = (random() - 0.5) * (boxW * 0.015); 
                    vy = -fountainF - (random() * 3); 
                    canCollide = false; 
                }
                
                let pColor = isRandomColor ? `hsl(${Math.random() * 360}, 100%, 50%)` : baseColor;
                allBalls.push(new Ball(px, py, vx, vy, particleRadius, userBounce, canCollide, sFrame, pColor));
            }

            if (!wasShowingVisual) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dibujarFondoYParedes(ctx);
            }

            actualizarEstadoUI();
            
            if (wasShowingVisual) {
                animationId = requestAnimationFrame(animarCalculo);
            } else {
                timeoutId = setTimeout(() => animarCalculo(performance.now()), 0);
            }
        });

        function animarCalculo(time) {
            if (isCalcPaused || !isCalculating) return;

            if (!lastTime) lastTime = time;
            let dtReal = time - lastTime;
            
            let showVisual = checkMostrarCalc.checked;
            let framesToProcess = 1;
            
            if (showVisual) {
                if (dtReal < frameInterval) {
                    animationId = requestAnimationFrame(animarCalculo);
                    return;
                }
                framesToProcess = Math.floor(dtReal / frameInterval);
                if (framesToProcess > 5) framesToProcess = 5; 
                lastTime = time - (dtReal % frameInterval);
            } else {
                framesToProcess = 30; 
                lastTime = time; 
            }

            let startTime = performance.now();
            let processComplete = false;

            let currentSubsteps = parseInt(inputSubsteps.value) || 15;
            let currentGravity = (parseFloat(inputGrav.value) || 1.0) * 0.3;
            let collisionIters = parseInt(inputIters.value) || 2;
            let timeScale = 60 / targetFPS; 
            let dt = (simSpeed * timeScale) / currentSubsteps;

            let f = 0;
            while (true) {
                currentFrame++;
                
                for (let b of allBalls) {
                    if (!b.isActive && currentFrame >= b.spawnFrame) b.isActive = true;
                }

                for (let step = 0; step < currentSubsteps; step++) {
                    for (let b of allBalls) { 
                        if (!b.isActive) continue;
                        b.update(dt, currentGravity);
                        b.constrain();
                    }
                    for (let iter = 0; iter < collisionIters; iter++) {
                        solveCollisions();
                        for (let b of allBalls) { if (b.isActive) b.constrain(); }
                    }
                }

                let frameData = new Float32Array(allBalls.length * 2);
                for (let j = 0; j < allBalls.length; j++) {
                    frameData[j * 2] = allBalls[j].isActive ? allBalls[j].x : -9999;
                    frameData[j * 2 + 1] = allBalls[j].y;
                }
                renderFrames.push(frameData);

                if (checkAutoCut.checked && currentFrame >= stopFrame) {
                    processComplete = true;
                    break;
                }

                f++;
                if (showVisual && f >= framesToProcess) break;
                if (!showVisual && performance.now() - startTime > 15) break; 
            }

            if (processComplete) {
                ejecutarPintado();
                return; 
            }

            if (showVisual) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dibujarFondoYParedes(ctx);
                for (let b of allBalls) { if (b.isActive) b.draw(ctx); }
            }
            
            actualizarEstadoUI();
            
            if (showVisual) {
                animationId = requestAnimationFrame(animarCalculo);
            } else {
                timeoutId = setTimeout(() => animarCalculo(performance.now()), 0);
            }
        }

        function ejecutarPintado() {
            cancelAnimationFrame(animationId);
            clearTimeout(timeoutId);
            isCalculating = false;
            estadoStr = 'LISTO';
            actualizarEstadoUI();
            
            let minX = canvas.width, maxX = 0, minY = canvas.height, maxY = 0;
            for (let b of allBalls) {
                if (!b.isActive) continue;
                if (b.x < minX) minX = b.x;
                if (b.x > maxX) maxX = b.x;
                if (b.y < minY) minY = b.y;
                if (b.y > maxY) maxY = b.y;
            }

            minX -= particleRadius; maxX += particleRadius;
            minY -= particleRadius; maxY += particleRadius;
            let pileW = maxX - minX;
            let pileH = maxY - minY;

            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = Math.ceil(pileW);
            offCanvas.height = Math.ceil(pileH);
            
            let mode = mapMode.value;

            if (mode === 'stretch') {
                offCtx.drawImage(currentImage, 0, 0, pileW, pileH);
            } else {
                let imgAspect = currentImage.width / currentImage.height;
                let pileAspect = pileW / pileH;
                let drawW, drawH, drawX, drawY;

                if (imgAspect > pileAspect) {
                    drawH = pileH;
                    drawW = currentImage.width * (pileH / currentImage.height);
                    drawX = (pileW - drawW) / 2;
                    drawY = 0;
                } else {
                    drawW = pileW;
                    drawH = currentImage.height * (pileW / currentImage.width);
                    drawX = 0;
                    drawY = (pileH - drawH) / 2;
                }
                offCtx.drawImage(currentImage, drawX, drawY, drawW, drawH);
            }
            
            let imgData;
            try {
                imgData = offCtx.getImageData(0, 0, pileW, pileH).data;
            } catch(e) {
                displayEstado.textContent = translations[currentLang].errCors; return;
            }

            for (let b of allBalls) {
                if (!b.isActive) continue;
                let relX = Math.floor(b.x - minX);
                let relY = Math.floor(b.y - minY);

                if (relX >= 0 && relX < pileW && relY >= 0 && relY < pileH) {
                    let i = (relY * Math.ceil(pileW) + relX) * 4;
                    if (imgData[i+3] > 10) {
                        b.color = `rgb(${imgData[i]},${imgData[i+1]},${imgData[i+2]})`;
                    }
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dibujarFondoYParedes(ctx);
            
            ctx.fillStyle = "#00adb5";
            ctx.font = "bold 24px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.fillText(translations[currentLang].msgListoCanvas1, canvas.width/2, canvas.height/2 - 15);
            ctx.font = "16px 'Segoe UI'";
            ctx.fillStyle = "#ccc";
            ctx.fillText(translations[currentLang].msgListoCanvas2, canvas.width/2, canvas.height/2 + 15);
            
            btnPintar.disabled = true;
            btnPauseCalc.disabled = true;
            btnCancelCalc.disabled = true;
            
            btnIniciar.disabled = false;
            btnPlay.disabled = false;
            btnDl.disabled = false; 
            btnExport.disabled = false;

            grabarVideoFondoNinja();
        }

        function procesarJSON(data) {
            try {
                targetFPS = data.fps;
                inputFPS.value = targetFPS;
                frameInterval = 1000 / targetFPS;
                
                inputBgColor.value = data.bg;
                
                boxW = data.boxW;
                sliderAncho.value = boxW;
                document.getElementById('val-ancho').textContent = boxW;
                wallLeft = (canvas.width - boxW) / 2;
                wallRight = wallLeft + boxW;
                
                particleRadius = data.radius;
                
                allBalls = data.colors.map(c => {
                    let b = new Ball(0,0,0,0, particleRadius, 0, false, 0, c);
                    b.isActive = true;
                    return b;
                });
                
                if (data.decodedFrames) {
                    renderFrames = data.decodedFrames;
                } else {
                    renderFrames = data.frames.map(b64 => decodeF32(b64));
                }
                
                cancelAnimationFrame(animationId);
                clearTimeout(timeoutId);
                isCalculating = false;
                isCalcPaused = false;
                isPlayingPaused = false;
                playbackIndex = 0;
                isPlayingDemo = false;
                
                estadoStr = 'LISTO';
                actualizarEstadoUI();
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dibujarFondoYParedes(ctx);
                
                ctx.fillStyle = "#00adb5";
                ctx.font = "bold 24px 'Segoe UI'";
                ctx.textAlign = "center";
                ctx.fillText(translations[currentLang].msgImportSuccess1, canvas.width/2, canvas.height/2 - 15);
                ctx.font = "16px 'Segoe UI'";
                ctx.fillStyle = "#ccc";
                ctx.fillText(translations[currentLang].msgImportSuccess2, canvas.width/2, canvas.height/2 + 15);
                
                btnIniciar.disabled = false;
                btnPauseCalc.disabled = true;
                btnCancelCalc.disabled = true;
                btnPintar.disabled = true;
                btnPlay.disabled = false;
                btnPausePlay.disabled = true;
                btnDl.disabled = false;
                btnExport.disabled = false;
                
                grabarVideoFondoNinja();
            } catch(err) {
                alert(translations[currentLang].errImport);
            }
        }

        function grabarVideoFondoNinja() {
            isVideoReady = false;
            
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            let targetW = Math.round(rect.width * dpr);
            let targetH = Math.round(rect.height * dpr);
            
            if (targetW === 0 || targetH === 0) {
                targetW = 800;
                targetH = 600;
            }
            
            hiddenCanvas.width = targetW;
            hiddenCanvas.height = targetH;
            
            const scaleX = targetW / 800;
            const scaleY = targetH / 600;
            
            const stream = hiddenCanvas.captureStream(targetFPS); 
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm', videoBitsPerSecond: 15000000 });
            let chunks = [];
            
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            mediaRecorder.onstop = () => {
                videoBlob = new Blob(chunks, { type: 'video/webm' });
                isVideoReady = true;
            };
            
            mediaRecorder.start();

            let recIndex = 0;
            recordingInterval = setInterval(() => {
                if (recIndex >= renderFrames.length) {
                    clearInterval(recordingInterval);
                    mediaRecorder.stop();
                    return;
                }

                hCtx.save();
                hCtx.scale(scaleX, scaleY);
                
                hCtx.fillStyle = inputBgColor.value;
                hCtx.fillRect(0, 0, 800, 600);
                hCtx.strokeStyle = '#2e2e2e';
                hCtx.lineWidth = 2;
                hCtx.beginPath();
                hCtx.moveTo(wallLeft, 0);
                hCtx.lineTo(wallLeft, floorY);
                hCtx.lineTo(wallRight, floorY);
                hCtx.lineTo(wallRight, 0);
                hCtx.stroke();
                
                let data = renderFrames[recIndex];
                for (let j = 0; j < allBalls.length; j++) {
                    let posX = data[j * 2];
                    let posY = data[j * 2 + 1];
                    if (posX !== -9999) {
                        hCtx.beginPath();
                        hCtx.arc(posX, posY, allBalls[j].radius, 0, Math.PI * 2);
                        hCtx.fillStyle = allBalls[j].color;
                        hCtx.fill();
                    }
                }
                
                hCtx.restore();
                recIndex++;
            }, 1000 / targetFPS); 
        }

        btnPausePlay.addEventListener('click', () => {
            isPlayingPaused = !isPlayingPaused;
            btnPausePlay.textContent = isPlayingPaused ? translations[currentLang].btnReanudar : translations[currentLang].btnPausar;
            
            if (isPlayingPaused) {
                estadoStr = isPlayingDemo ? 'PAUSADO_DEMO' : 'PAUSADO_REP';
                actualizarEstadoUI();
            } else {
                if (isPlayingDemo) {
                    demoLastTime = 0; 
                    estadoStr = 'REPRODUCIENDO_DEMO';
                    actualizarEstadoUI();
                    requestAnimationFrame(animarPlaybackDemo);
                } else {
                    lastPlaybackTime = 0; 
                    estadoStr = 'REPRODUCIENDO';
                    actualizarEstadoUI();
                    requestAnimationFrame(animarPlayback);
                }
            }
        });

        btnPlay.addEventListener('click', () => {
            cancelAnimationFrame(animationId);
            playbackIndex = 0;
            lastPlaybackTime = 0;
            isPlayingPaused = false;
            isPlayingDemo = false;
            
            btnPausePlay.disabled = false;
            btnPausePlay.textContent = translations[currentLang].btnPausar;
            
            estadoStr = 'REPRODUCIENDO';
            actualizarEstadoUI();
            requestAnimationFrame(animarPlayback);
        });

        function animarPlayback(time) {
            if (isPlayingPaused || isPlayingDemo) return;

            if (!lastPlaybackTime) lastPlaybackTime = time;
            let dtReal = time - lastPlaybackTime;

            let speedMult = parseFloat(inputSpeed.value) || 1.0;
            let framesAvanzar = (dtReal / (1000/targetFPS)) * speedMult;
            
            playbackIndex += framesAvanzar;
            lastPlaybackTime = time;

            let intIndex = Math.floor(playbackIndex);

            if (intIndex < renderFrames.length) {
                let data = renderFrames[intIndex];
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dibujarFondoYParedes(ctx);

                for (let j = 0; j < allBalls.length; j++) {
                    let posX = data[j * 2];
                    let posY = data[j * 2 + 1];
                    
                    if (posX !== -9999) { 
                        ctx.beginPath();
                        ctx.arc(posX, posY, allBalls[j].radius, 0, Math.PI * 2);
                        ctx.fillStyle = allBalls[j].color; 
                        ctx.fill();
                    }
                }

                animationId = requestAnimationFrame(animarPlayback);
            } 
            else {
                estadoStr = 'FIN_REP';
                actualizarEstadoUI();
                btnPausePlay.disabled = true;
            }
        }

        function animarPlaybackDemo(time) {
            if (!isPlayingDemo || isPlayingPaused) return;

            if (!demoLastTime) demoLastTime = time;
            let dtReal = time - demoLastTime;

            let demoFPS = demoData.fps || 60;
            let speedMult = parseFloat(inputSpeed.value) || 1.0;
            let framesAvanzar = (dtReal / (1000/demoFPS)) * speedMult;
            
            demoPlaybackIndex += framesAvanzar;
            demoLastTime = time;

            let intIndex = Math.floor(demoPlaybackIndex);
            let frames = demoData.decodedFrames;

            if (intIndex < frames.length) {
                let data = frames[intIndex];
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let dBoxW = demoData.boxW || 400;
                let dWallLeft = (canvas.width - dBoxW) / 2;
                let dWallRight = dWallLeft + dBoxW;
                
                ctx.fillStyle = demoData.bg || '#050505';
                ctx.fillRect(0, 0, 800, 600);
                ctx.strokeStyle = '#2e2e2e';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(dWallLeft, 0);
                ctx.lineTo(dWallLeft, floorY);
                ctx.lineTo(dWallRight, floorY);
                ctx.lineTo(dWallRight, 0);
                ctx.stroke();

                let dRadius = demoData.radius || 5;
                let dColors = demoData.colors;

                for (let j = 0; j < dColors.length; j++) {
                    let posX = data[j * 2];
                    let posY = data[j * 2 + 1];
                    
                    if (posX !== -9999) { 
                        ctx.beginPath();
                        ctx.arc(posX, posY, dRadius, 0, Math.PI * 2);
                        ctx.fillStyle = dColors[j]; 
                        ctx.fill();
                    }
                }

                animationId = requestAnimationFrame(animarPlaybackDemo);
            } 
            else {
                estadoStr = 'FIN_DEMO';
                actualizarEstadoUI();
                isPlayingDemo = false;
                btnPausePlay.disabled = true;
            }
        }

        btnDl.addEventListener('click', () => {
            if (!isVideoReady) {
                let prevText = btnDl.textContent;
                btnDl.textContent = translations[currentLang].btnDlWait;
                setTimeout(() => {
                    if (btnDl.textContent === translations[currentLang].btnDlWait) {
                        btnDl.textContent = prevText;
                    }
                }, 1500);
                return;
            }
            let url = URL.createObjectURL(videoBlob);
            let a = document.createElement('a');
            a.href = url;
            a.download = translations[currentLang].fileSimulation + '.webm';
            a.click();
        });

        btnExport.addEventListener('click', async () => {
            const data = {
                fps: targetFPS,
                bg: inputBgColor.value,
                boxW: boxW,
                radius: particleRadius,
                colors: allBalls.map(b => b.color),
                frames: renderFrames.map(f => encodeF32(f))
            };
            const jsonStr = JSON.stringify(data);
            
            try {
                if (window.showSaveFilePicker) {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: translations[currentLang].fileSimulation + '.json',
                        types: [{
                            description: 'JSON File',
                            accept: {'application/json': ['.json']}
                        }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(jsonStr);
                    await writable.close();
                } else {
                    const blob = new Blob([jsonStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = translations[currentLang].fileSimulation + '.json';
                    a.click();
                    URL.revokeObjectURL(url);
                }
            } catch (e) {
                
            }
        });

        btnImport.addEventListener('click', () => {
            importInput.click();
        });

        importInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    procesarJSON(data);
                } catch(err) {
                    alert(translations[currentLang].errImport);
                }
            };
            reader.readAsText(file);
            e.target.value = ''; 
        });

        initLanguage();
        updateTargetFrames();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dibujarFondoYParedes(ctx);

    </script>
</body>
</html>
